<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookVerse – Cart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <h1>📚 BookVerse</h1>
  <nav><a href="index.html">🏠 Home</a></nav>
  <button class="cart-icon" onclick="window.location.href='cart.html'">
    🛒 Cart (<span id="cart-count">0</span>)
  </button>
</header>

<div class="cart-container">
  <a href="index.html" class="back-link">← Continue Shopping</a>
  <h2>🛒 Your Cart</h2>
  <div id="cart-items"></div>
  <div id="cart-summary"></div>
</div>

<script>
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  function updateCartCount() {
    document.getElementById("cart-count").innerText = cart.length;
  }

  function removeItem(id) {
    cart = cart.filter(b => b.id !== id);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    loadCart();
  }

  function loadCart() {
    const itemsContainer = document.getElementById("cart-items");
    const summaryContainer = document.getElementById("cart-summary");

    if (cart.length === 0) {
      itemsContainer.innerHTML = `
        <div class="empty-msg">
          <p>😕 Your cart is empty!</p>
          <a href="index.html" style="color:#ffd27a;font-size:15px;">Browse Books →</a>
        </div>`;
      summaryContainer.innerHTML = "";
      return;
    }

    itemsContainer.innerHTML = cart.map(item => `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.title}">
        <div class="cart-item-info">
          <h3>${item.title}</h3>
          <p>${item.author}</p>
          <p>${item.category}</p>
        </div>
        <span class="cart-item-price">₹${item.price}</span>
        <button class="btn-danger" onclick="removeItem(${item.id})">Remove</button>
      </div>
    `).join("");

    const subtotal = cart.reduce((s, b) => s + b.price, 0);
    const discount = Math.floor(subtotal * 0.05);
    const total = subtotal - discount;

    summaryContainer.innerHTML = `
      <div class="summary-box">
        <div class="summary-row"><span>Subtotal (${cart.length} item${cart.length > 1 ? "s" : ""})</span><span>₹${subtotal}</span></div>
        <div class="summary-row"><span>Discount (5%)</span><span class="discount-text">− ₹${discount}</span></div>
        <div class="summary-row"><span>Delivery</span><span class="discount-text">Free</span></div>
        <div class="summary-total"><span>Total</span><span>₹${total}</span></div>
      </div>
      <br>
      <button class="btn-gold" onclick="window.location.href='checkout.html'">Proceed to Checkout →</button>
    `;
  }

  updateCartCount();
  loadCart();
</script>
</body>
</html>
